apiVersion: apps/v1
kind: Deployment
metadata:
  name: conf-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conf-web
  template:
    metadata:
      labels:
        app: conf-web
    spec:
      containers:
      - name: conf-web
        image: ajay23mis0669/html-demo:latest
        ports:
        - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: conf-service
spec:
  type: NodePort
  selector:
    app: conf-web
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 8086
